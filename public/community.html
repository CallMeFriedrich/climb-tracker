<!doctype html>
<html lang="de">
<head>
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Climb Tracker – Community</title>
  <link rel="stylesheet" href="app.css" />
</head>
<body>
  <div class="container">
    <div class="topbar">
      <a class="brand" href="index.html">
        <div class="title">Climb Tracker</div>
        <div class="subtitle">Community</div>
      </a>
      <div class="nav">
        <a class="pill" href="index.html">Dashboard</a>
      </div>
    </div>

    <div class="card">
      <div class="tab-bar">
        <button class="tab-btn active" data-tab="tabLeaderboard">Leaderboard</button>
        <button class="tab-btn" data-tab="tabUsers">Alle Nutzer</button>
      </div>

      <div id="tabLeaderboard" class="tab-content active">
        <p class="muted">Woche ab: <span id="lbStart"></span></p>
        <div class="divider"></div>
        <div id="board"></div>
      </div>

      <div id="tabUsers" class="tab-content">
        <p class="muted">Klicke auf einen Nutzer, um Profil, Ziele und Logbuch zu sehen.</p>
        <div class="divider"></div>
        <div id="users" class="user-list"></div>
      </div>
    </div>
  </div>

  <script src="app.js?v=2026-04-07b"></script>
  <script>
    initCommunityPage();
  </script>
</body>
</html>
